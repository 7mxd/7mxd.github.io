backend:
  name: github
  repo: 7mxd/7mxd.github.io
  branch: main
  # TODO: Replace with your Vercel deployment URL (e.g., https://your-project.vercel.app)
  base_url: https://7mxd-oauth.vercel.app
  auth_endpoint: /auth

site_url: https://7mxd.github.io

media_folder: "assets"
public_folder: "assets"

collections:
  # Profile - single file
  - name: "profile"
    label: "Profile"
    files:
      - name: "profile"
        label: "Profile Information"
        file: "data/profile.json"
        fields:
          - { name: "name", label: "Full Name", widget: "string" }
          - { name: "title", label: "Professional Title", widget: "string" }
          - name: "contact"
            label: "Contact Information"
            widget: "object"
            fields:
              - { name: "email", label: "Email", widget: "string" }
              - { name: "phone", label: "Phone", widget: "string" }
              - { name: "location", label: "Location", widget: "string" }
              - name: "linkedin"
                label: "LinkedIn"
                widget: "object"
                fields:
                  - { name: "url", label: "LinkedIn URL", widget: "string" }
                  - { name: "label", label: "Display Label", widget: "string", default: "LinkedIn Profile" }
              - name: "github"
                label: "GitHub"
                widget: "object"
                required: false
                fields:
                  - { name: "url", label: "GitHub URL", widget: "string", required: false, hint: "Leave empty to hide GitHub link" }
                  - { name: "label", label: "Display Label", widget: "string", default: "github.com/7mxd", required: false }

  # Summary - single file
  - name: "summary"
    label: "Summary"
    files:
      - name: "summary"
        label: "Professional Summary"
        file: "data/summary.json"
        fields:
          - { name: "content", label: "Summary Text", widget: "text" }

  # Settings - single file
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "settings"
        label: "Settings"
        file: "data/settings.json"
        fields:
          - name: "cv"
            label: "CV/Resume"
            widget: "object"
            fields:
              - { name: "path", label: "CV File", widget: "file" }
              - { name: "downloadName", label: "Download Filename", widget: "string" }
          - { name: "siteTitle", label: "Site Title", widget: "string" }
          - { name: "navLogo", label: "Navigation Logo Text", widget: "string" }
          - name: "meta"
            label: "SEO Metadata"
            widget: "object"
            fields:
              - { name: "title", label: "Meta Title", widget: "string" }
              - { name: "description", label: "Meta Description", widget: "text" }
              - { name: "keywords", label: "Keywords", widget: "string" }
              - { name: "url", label: "Site URL", widget: "string" }
          - name: "sections"
            label: "Section Visibility"
            widget: "object"
            fields:
              - name: "summary"
                label: "Summary"
                widget: "object"
                fields:
                  - { name: "enabled", label: "Show Summary Section", widget: "boolean", default: true }
              - name: "education"
                label: "Education"
                widget: "object"
                fields:
                  - { name: "enabled", label: "Show Education Section", widget: "boolean", default: true }
              - name: "experience"
                label: "Experience"
                widget: "object"
                fields:
                  - { name: "enabled", label: "Show Experience Section", widget: "boolean", default: true }
              - name: "skills"
                label: "Skills"
                widget: "object"
                fields:
                  - { name: "enabled", label: "Show Skills Section", widget: "boolean", default: true }
              - name: "projects"
                label: "Projects"
                widget: "object"
                fields:
                  - { name: "enabled", label: "Show Projects Section", widget: "boolean", default: true }

  # Education - list in single file
  - name: "education"
    label: "Education"
    files:
      - name: "education"
        label: "Education Entries"
        file: "data/education.json"
        fields:
          - name: "items"
            label: "Education"
            widget: "list"
            fields:
              - { name: "institution", label: "Institution Name", widget: "string" }
              - { name: "logo", label: "Institution Logo", widget: "image" }
              - { name: "degree", label: "Degree/Certificate", widget: "string" }
              - { name: "startDate", label: "Start Date (YYYY-MM or YYYY)", widget: "string" }
              - { name: "endDate", label: "End Date (YYYY-MM or YYYY)", widget: "string" }
              - { name: "displayDate", label: "Display Date Text", widget: "string", hint: "e.g., Aug 2018 - May 2023" }
              - { name: "grade", label: "Grade/GPA", widget: "string" }

  # Experience - list in single file
  - name: "experience"
    label: "Experience"
    files:
      - name: "experience"
        label: "Work Experience"
        file: "data/experience.json"
        fields:
          - name: "items"
            label: "Companies"
            widget: "list"
            fields:
              - { name: "company", label: "Company Name", widget: "string" }
              - name: "logo"
                label: "Company Logo"
                widget: "object"
                fields:
                  - { name: "default", label: "Default Logo", widget: "image" }
                  - { name: "light", label: "Light Theme Logo (optional)", widget: "image", required: false }
                  - { name: "dark", label: "Dark Theme Logo (optional)", widget: "image", required: false }
              - { name: "location", label: "Location", widget: "string" }
              - name: "roles"
                label: "Roles"
                widget: "list"
                fields:
                  - { name: "title", label: "Job Title", widget: "string" }
                  - { name: "startDate", label: "Start Date (YYYY-MM)", widget: "string" }
                  - { name: "endDate", label: "End Date (YYYY-MM or Present)", widget: "string" }
                  - { name: "displayDate", label: "Display Date Text", widget: "string", hint: "e.g., 09/2024 - Present" }
                  - { name: "responsibilities", label: "Responsibilities", widget: "list", field: { name: "item", label: "Responsibility", widget: "text" } }

  # Projects - list in single file
  - name: "projects"
    label: "Projects"
    files:
      - name: "projects"
        label: "Projects"
        file: "data/projects.json"
        fields:
          - name: "items"
            label: "Projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Project Title", widget: "string" }
              - name: "status"
                label: "Status badge (optional)"
                widget: "select"
                required: false
                options:
                  - { label: "(none)", value: "" }
                  - { label: "in progress", value: "in-progress" }
                  - { label: "shipped", value: "shipped" }
                  - { label: "research", value: "research" }
                hint: "Shown as a small pill next to the project title."
              - { name: "description", label: "Brief Description", widget: "text" }
              - { name: "image", label: "Project Image (optional)", widget: "image", required: false }
              - name: "chartCaption"
                label: "Chart caption (optional)"
                widget: "text"
                required: false
                hint: "One short sentence above the ASCII chart. Plain language for non-experts."
              - name: "chart"
                label: "ASCII chart (optional)"
                widget: "text"
                required: false
                hint: "Multi-line ASCII chart. Use the block character █ for bars. Each █ run is auto-styled in the accent color."
              - name: "links"
                label: "Links"
                widget: "object"
                fields:
                  - { name: "github", label: "GitHub URL", widget: "string", required: false }
                  - { name: "webapp", label: "Web App / Page URL", widget: "string", required: false }
                  - { name: "ios", label: "iOS App URL", widget: "string", required: false }
                  - { name: "android", label: "Android App URL", widget: "string", required: false }
                  - name: "extra"
                    label: "Additional Links"
                    widget: "list"
                    required: false
                    fields:
                      - { name: "label", label: "Link Label", widget: "string" }
                      - { name: "url", label: "URL", widget: "string" }
              - name: "tags"
                label: "Tags (optional)"
                widget: "list"
                required: false
                field: { name: "tag", label: "Tag", widget: "string" }

  # Skills - list in single file
  - name: "skills"
    label: "Skills"
    files:
      - name: "skills"
        label: "Skills Categories"
        file: "data/skills.json"
        fields:
          - name: "categories"
            label: "Skill Categories"
            widget: "list"
            summary: "{{fields.name}} ({{fields.type}})"
            fields:
              - { name: "name", label: "Category Name", widget: "string" }
              - name: "type"
                label: "Display Type"
                widget: "select"
                options:
                  - { label: "Simple List (dot-separated line)", value: "list" }
                  - { label: "Tags (pill row)", value: "tags" }
                  - { label: "Languages (name, native script, level)", value: "languages" }
                hint: "Use Languages for the spoken-languages list. Tags for tools/stack. Simple List for short comma lists."
              - name: "items"
                label: "Skills"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { name: "name", label: "Name", widget: "string", hint: "For Tags and Simple List, the skill or tool. For Languages, the language in English (e.g. Arabic)." }
                  - { name: "level", label: "Level (Languages only)", widget: "string", required: false, hint: "Plain word, no scale. Examples: native, fluent, beginner." }
